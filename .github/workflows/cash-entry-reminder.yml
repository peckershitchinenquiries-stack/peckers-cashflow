name: Missing cash-entry reminder

# Reminds Rishi if a manager forgot to log the previous day's cash entry.
# Runs daily at ~3pm UK time. GitHub cron is in UTC, so 14:00 UTC ≈ 15:00 BST
# (British Summer Time). Adjust to '0 15 * * *' for GMT (winter) if needed.
on:
  schedule:
    - cron: "0 14 * * *"
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        # Requires two repository secrets:
        #   APP_URL      — e.g. https://peckers.vercel.app (no trailing slash)
        #   CRON_SECRET  — must match CRON_SECRET in the app's server env
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          missing=0
          if [ -z "$APP_URL" ]; then
            echo "::error::Repository secret APP_URL is not set. Add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set. It must match CRON_SECRET in the app's server env."
            missing=1
          fi
          exit $missing

      - name: Call reminder endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${APP_URL%/}/api/cron/missing-cash-entry" \
            -H "Authorization: Bearer ${CRON_SECRET}"
